<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Edicative game</title>
</head>
<body>
    <div id="images">
        <img src="no.png" class="img" data-state="false">
        <img src="no.png" class="img" data-state="false">
        <img src="no.png" class="img" data-state="false">
        <img src="no.png" class="img" data-state="false">
        <img src="no.png" class="img" data-state="false">
        <img src="no.png" class="img" data-state="false">
        <img src="no.png" class="img" data-state="false">
        <img src="no.png" class="img" data-state="false">
        <img src="no.png" class="img" data-state="false">
        <img src="no.png" class="img" data-state="false">
        <img src="no.png" class="img" data-state="false">
        <img src="no.png" class="img" data-state="false">
        <img src="no.png" class="img" data-state="false">
    </div>
    <div id="results">
        <div class="result">Binary (Base-2): <p id="bin">0</p></div>
        <div class="result">Octal (Base-8): <p id="oct">0</p></div>
        <div class="result">Decimal (Base-10): <p id="dec">0</p></div>
        <div class="result">Hexadecimal (Base-16): <p id="hex">0</p></div>
    </div>
    <dl>
        <dt>Binary</dt>
        <dd>0 or 1, widely used in computer science</dd>
        <dt>Octal</dt>
        <dd>from 0 to 7</dd>
        <dt>Delical</dt>
        <dd>form 0 to 9, daily used number system</dd>
        <dt>Hexadecimal</dt>
        <dd>from 0 to 15, used for defining colors</dd>
    </dl>
</body>
<script src="script.js"></script>
</html>
